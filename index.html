<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annuaire — Groupe Tressol-Chabrier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#eef2f5;
    --surface:#ffffff;
    --surface-alt:#f5f8fa;
    --border:#dbe3e9;
    --text:#1f2d3a;
    --text-soft:#5b6b7a;
    --primary:#1b6b8a;
    --primary-dark:#124a5f;
    --primary-tint:#e4eef2;
    --accent:#6b7c93;
    --danger:#b23b3b;
    --danger-tint:#f6e8e8;
    --ok:#2f7d5e;
    --radius:10px;
    --shadow: 0 1px 2px rgba(27,50,64,0.06), 0 4px 14px rgba(27,50,64,0.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand{font-family:'Manrope',system-ui,sans-serif;}

  header.topbar{
    background:linear-gradient(135deg,var(--primary) 0%, var(--primary-dark) 100%);
    color:#fff;
    padding:18px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:38px;height:38px;border-radius:9px;flex:none;
    background:rgba(255,255,255,0.15);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;letter-spacing:0.5px;
    border:1px solid rgba(255,255,255,0.25);
  }
  .brand-text h1{margin:0;font-size:17px;font-weight:800;letter-spacing:0.2px;}
  .brand-text span{font-size:12px;opacity:0.85;}

  .mode-zone{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .mode-pill{
    font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:99px;
    background:rgba(255,255,255,0.14);
    border:1px solid rgba(255,255,255,0.28);
  }
  .mode-pill.on{background:#fff;color:var(--primary-dark);}
  button{font-family:inherit;cursor:pointer;}
  .btn{
    border:none;border-radius:8px;padding:9px 16px;font-size:13.5px;font-weight:600;
    display:inline-flex;align-items:center;gap:7px;transition:transform .08s ease, opacity .15s ease;
    white-space:nowrap;
  }
  .btn:active{transform:scale(0.97);}
  .btn-ghost-light{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.3);}
  .btn-ghost-light:hover{background:rgba(255,255,255,0.2);}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-outline{background:#fff;color:var(--primary);border:1px solid var(--border);}
  .btn-outline:hover{background:var(--primary-tint);}
  .btn-danger{background:var(--danger-tint);color:var(--danger);}
  .btn-danger:hover{background:#f0d6d6;}
  .btn-sm{padding:6px 10px;font-size:12px;}

  main{max-width:1320px;margin:0 auto;padding:22px 20px 50px;}

  .controls{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    margin-bottom:14px;
  }
  .tabs{
    display:flex;background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:4px;box-shadow:var(--shadow);
  }
  .tab{
    border:none;background:transparent;padding:9px 18px;border-radius:7px;
    font-size:13.5px;font-weight:600;color:var(--text-soft);
  }
  .tab.active{background:var(--primary);color:#fff;}

  .search-wrap{position:relative;flex:1;min-width:200px;}
  .search-wrap input{
    width:100%;padding:10px 14px 10px 36px;border-radius:10px;border:1px solid var(--border);
    font-size:13.5px;background:var(--surface);color:var(--text);
  }
  .search-wrap input:focus{outline:2px solid var(--primary);outline-offset:1px;}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:0.45;}

  select.filter-select{
    padding:9px 12px;border-radius:10px;border:1px solid var(--border);
    font-size:13.5px;background:var(--surface);color:var(--text);max-width:190px;
  }

  .count-badge{
    font-size:12px;font-weight:700;padding:6px 13px;border-radius:99px;
    background:var(--primary-tint);color:var(--primary-dark);white-space:nowrap;
  }

  /* Tableau */
  .table-scroll{
    max-height:68vh;overflow:auto;border:1px solid var(--border);border-radius:var(--radius);
    background:var(--surface);box-shadow:var(--shadow);
  }
  table.directory{width:100%;border-collapse:collapse;font-size:13px;min-width:920px;}
  table.directory thead th{
    position:sticky;top:0;background:var(--surface-alt);text-align:left;padding:11px 13px;
    font-size:11px;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-soft);
    border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;z-index:2;
  }
  table.directory thead th:last-child{border-right:none;}
  table.directory tbody td{padding:10px 13px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle;color:var(--text);}
  table.directory tbody td:last-child{border-right:none;}
  table.directory tbody tr:nth-child(even){background:var(--surface-alt);}
  table.directory tbody tr:hover{background:var(--primary-tint);}
  table.directory tbody tr:last-child td{border-bottom:none;}
  table.directory td.name-cell{font-weight:700;white-space:nowrap;}
  .chip-cell{display:flex;flex-wrap:wrap;gap:4px;max-width:220px;}
  .chip{
    font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap;
    background:var(--surface-alt);color:var(--accent);border:1px solid var(--border);
  }
  .chip.brand{background:var(--primary-tint);color:var(--primary-dark);border-color:transparent;}
  .chip.contract-yes{background:#e3f1ea;color:var(--ok);border-color:#cfe8d9;}
  .mail-link{color:var(--primary);text-decoration:none;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
  .mail-link:hover{text-decoration:underline;}
  .actions-cell{display:flex;gap:6px;justify-content:flex-end;white-space:nowrap;}
  .empty-row td{text-align:center;padding:50px 20px;color:var(--text-soft);}

  /* Modal */
  .overlay{
    position:fixed;inset:0;background:rgba(20,35,45,0.45);display:none;
    align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:#fff;border-radius:14px;width:100%;max-width:440px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);max-height:88vh;overflow-y:auto;
  }
  .modal.wide{max-width:620px;}
  .modal-head{
    padding:18px 22px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
  }
  .modal-head h3{margin:0;font-size:15.5px;}
  .modal-body{padding:20px 22px;display:flex;flex-direction:column;gap:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:5px;}
  .field input, .field select{
    width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13.5px;
    font-family:inherit;color:var(--text);
  }
  .field input:focus, .field select:focus{outline:2px solid var(--primary);outline-offset:1px;}
  .checkbox-group{
    border:1px solid var(--border);border-radius:8px;padding:9px 11px;max-height:160px;
    overflow-y:auto;display:flex;flex-direction:column;gap:7px;
  }
  .checkbox-group label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:400;color:var(--text);margin:0;}
  .checkbox-group input[type=checkbox]{width:auto;}
  .modal-foot{
    padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;
  }
  .close-x{background:none;border:none;font-size:20px;color:var(--text-soft);line-height:1;padding:2px 6px;border-radius:6px;}
  .close-x:hover{background:var(--surface-alt);}

  .signin-explain{font-size:12.5px;color:var(--text-soft);line-height:1.5;margin:0;}
  .signin-msg{font-size:12.5px;padding:9px 12px;border-radius:8px;display:none;}
  .signin-msg.error{display:block;background:var(--danger-tint);color:var(--danger);}

  .log-list{display:flex;flex-direction:column;gap:0;}
  .log-item{padding:11px 0;border-bottom:1px solid var(--border);font-size:12.5px;display:flex;flex-direction:column;gap:2px;}
  .log-item:last-child{border-bottom:none;}
  .log-item .who{font-weight:700;color:var(--text);}
  .log-item .when{color:var(--text-soft);font-size:11.5px;}
  .log-action{
    font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;
    padding:2px 7px;border-radius:99px;display:inline-block;margin-right:6px;
  }
  .log-action.creation{background:#e3f1ea;color:var(--ok);}
  .log-action.modification{background:var(--primary-tint);color:var(--primary-dark);}
  .log-action.suppression{background:var(--danger-tint);color:var(--danger);}

  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--text);color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;
    box-shadow:0 8px 24px rgba(0,0,0,0.2);opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;
    z-index:80;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  @media (max-width:700px){
    header.topbar{padding:14px 16px;}
    main{padding:16px 12px 40px;}
    table.directory{font-size:12.5px;}
    .modal{max-width:94vw;}
  }
</style>
</head>

<script>
// ================= CONFIGURATION À ADAPTER =================
const ADMIN_CODE = "GTC66!";
// URL de déploiement de ton Google Apps Script (voir apps_script_backend.gs) — se termine par /exec
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdIvItr5Ut2VR0aKIdwlV7U-qFBnNI767Gk7-6mFaXssqzyv5sLNOuWI9UTflPQgjP/exec";
// =============================================================

// ---- Couche de stockage hybride : window.storage (aperçu Claude) ou Apps Script (hébergement externe) ----
async function backendGet(key){
  const res = await fetch(`${APPS_SCRIPT_URL}?key=${encodeURIComponent(key)}`);
  const text = await res.text();
  if(!text) return null;
  return { value: text };
}
async function backendSet(key, value){
  try{
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors", // on n'a pas besoin de lire la réponse, seulement que l'écriture ait lieu
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // évite le preflight CORS
      body: JSON.stringify({ key, value })
    });
  }catch(err){
    throw err;
  }
  return { value };
}
function backendReady(){
  return APPS_SCRIPT_URL && !APPS_SCRIPT_URL.startsWith("REMPLACER_");
}
async function storageGet(key, shared){
  if(typeof window.storage !== "undefined"){
    try{ return await window.storage.get(key, shared); }catch(e){ /* clé absente, on continue */ }
  }
  if(backendReady()) return await backendGet(key);
  return null;
}
async function storageSet(key, value, shared){
  if(typeof window.storage !== "undefined"){
    try{ return await window.storage.set(key, value, shared); }catch(e){}
  }
  if(backendReady()) return await backendSet(key, value);
  return null;
}

function showToast(msg){

}

async function loadData(){
  const [gResult, fResult, cResult, lResult] = await Promise.all([
    storageGet("annuaire:groupe", STORAGE_SHARED).catch(()=>null),
    storageGet("annuaire:fournisseurs", STORAGE_SHARED).catch(()=>null),
    storageGet("annuaire:concessions", STORAGE_SHARED).catch(()=>null),
    storageGet("annuaire:log", STORAGE_SHARED).catch(()=>null),
  ]);
  try{ dataStore.groupe = gResult ? JSON.parse(gResult.value) : []; }catch(e){ dataStore.groupe = []; }
  try{ dataStore.fournisseurs = fResult ? JSON.parse(fResult.value) : []; }catch(e){ dataStore.fournisseurs = []; }
  try{ dataStore.concessions = cResult ? JSON.parse(cResult.value) : []; }catch(e){ dataStore.concessions = []; }
  try{ activityLog = lResult ? JSON.parse(lResult.value) : []; }catch(e){ activityLog = []; }

  // Premier chargement : si l'annuaire est encore vide, on l'initialise avec les données importées
  if(dataStore.groupe.length === 0 && dataStore.fournisseurs.length === 0){
    dataStore.groupe = SEED_GROUPE.slice();
    dataStore.fournisseurs = SEED_FOURNISSEURS.slice();
    await Promise.all([saveList("groupe"), saveList("fournisseurs")]);
  }
  if(dataStore.concessions.length === 0){
    dataStore.concessions = SEED_CONCESSIONS.slice();
    await saveList("concessions");
  }

  render();
}

async function saveList(tab){
  const key = tab === "groupe" ? "annuaire:groupe" : (tab === "fournisseurs" ? "annuaire:fournisseurs" : "annuaire:concessions");
  try{
    await storageSet(key, JSON.stringify(dataStore[tab]), STORAGE_SHARED);
  }catch(e){
    showToast("Erreur d'enregistrement, réessayez.");
  }
}

async function logAction(action, label){
  const entry = {
    action, label, tab: currentTab,
    adminName: currentAdminUser ? currentAdminUser.name : "Inconnu",
    date: new Date().toISOString()
  };
  activityLog.unshift(entry);
  activityLog = activityLog.slice(0, 300);
  try{ await storageSet("annuaire:log", JSON.stringify(activityLog), STORAGE_SHARED); }catch(e){}
}

function formatDate(iso){
  const d = new Date(iso);
  return d.toLocaleString("fr-FR", {day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit"});
}

  const list = $("#logList");
  if(activityLog.length === 0){
    list.innerHTML = `<p style="color:var(--text-soft);font-size:13px;">Aucune action enregistrée pour le moment.</p>`;
    return;
  }
  list.innerHTML = activityLog.map(e=>{
    const actionLabel = {creation:"Création", modification:"Modification", suppression:"Suppression"}[e.action] || e.action;
    const tabLabel = e.tab === "groupe" ? "Groupe" : (e.tab === "concessions" ? "Concessions" : "Fournisseurs");
    return `<div class="log-item">
      <div><span class="log-action ${e.action}">${actionLabel}</span><span class="who">${escapeHtml(e.label)}</span> <span style="color:var(--text-soft);">(${tabLabel})</span></div>
      <div class="when">${escapeHtml(e.adminName)} — ${formatDate(e.date)}</div>
    </div>`;
  }).join("");
}

function buildGroupeRows(){
  return dataStore.groupe.map(item=>({
    "Ville principale": item.villePrincipale || "",
    "Périmètre": asArrayExport(item.perimetre).join(", "),
    "Marques": asArrayExport(item.marques).join(", "),
    "Nom": item.nom || "",
    "Prénom": item.prenom || "",
    "Fonction": item.fonction || "",
    "Téléphone": item.telephone || "",
    "Email": item.email || ""
  }));
}
function buildFournisseurRows(){
  return dataStore.fournisseurs.map(item=>({
    "Société": item.societe || "",
    "Domaine d'intervention": item.domaine || "",
    "Départements d'intervention": item.departements || "",
    "Contrat groupe": item.contratGroupe === "O" ? "Oui" : "Non",
    "Nom interlocuteur": item.nomInterlocuteur || "",
    "Prénom interlocuteur": item.prenomInterlocuteur || "",
    "Téléphone": item.telephone || "",
    "Email": item.email || ""
  }));
}
function buildConcessionsRows(){
  return dataStore.concessions.map(item=>({
    "Société": item.societe || "",
    "Marques": asArrayExport(item.marques).join(", "),
    "Ville": item.ville || "",
    "Département": item.departement || "",
    "Adresse": item.adresse || "",
    "Code postal": item.cp || "",
    "SIRET": item.siret || "",
    "SIREN": item.siren || "",
    "NAF": item.naf || "",
    "Téléphone": item.telephone || "",
    "Fax": item.fax || "",
    "TVA intracommunautaire": item.tva || "",
    "Contact marketing": item.contactMarketing || "",
    "Commentaire": item.commentaire || "",
  }));
}
function buildHistoriqueRows(){
  return activityLog.map(e=>({
    "Date": formatDate(e.date),
    "Admin": e.adminName || "",
    "Action": {creation:"Création", modification:"Modification", suppression:"Suppression"}[e.action] || e.action,
    "Élément": e.label || "",
    "Onglet": e.tab === "groupe" ? "Groupe" : (e.tab === "concessions" ? "Concessions" : "Fournisseurs")
  }));
}
function asArrayExport(v){ return Array.isArray(v) ? v : (v ? [v] : []); }

function exportToExcel(){
  if(typeof XLSX === "undefined"){
    showToast("Bibliothèque Excel indisponible, vérifie ta connexion internet et réessaie.");
    return;
  }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildGroupeRows()), "Groupe");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildFournisseurRows()), "Fournisseurs");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildConcessionsRows()), "Concessions");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildHistoriqueRows()), "Historique");
  const dateStr = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `annuaire_gtc_export_${dateStr}.xlsx`);
  showToast("Export Excel généré.");
}

function escapeHtml(str){
  return String(str||"").replace(/[&<>"']/g, s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]));
}
function escapeAttr(str){ return escapeHtml(str); }
function asArray(v){ return Array.isArray(v) ? v : (v ? [v] : []); }

// ---- Colonnes ----
function getColumns(){
  if(currentTab === "groupe"){
    return [
      {key:"nom", label:"Nom"},
      {key:"prenom", label:"Prénom"},
      {key:"fonction", label:"Fonction"},
      {key:"villePrincipale", label:"Ville principale"},
      {key:"perimetre", label:"Périmètre"},
      {key:"marques", label:"Marques"},
      {key:"telephone", label:"Téléphone"},
      {key:"email", label:"Email"},
    ];
  }
  if(currentTab === "fournisseurs"){
    return [
      {key:"societe", label:"Société"},
      {key:"domaine", label:"Domaine d'intervention"},
      {key:"departements", label:"Départements"},
      {key:"contratGroupe", label:"Contrat groupe"},
      {key:"interlocuteur", label:"Interlocuteur"},
      {key:"telephone", label:"Téléphone"},
      {key:"email", label:"Email"},
    ];
  }
  return [
    {key:"societe", label:"Société"},
    {key:"marques", label:"Marques"},
    {key:"ville", label:"Ville"},
    {key:"departement", label:"Département"},
    {key:"siret", label:"SIRET"},
    {key:"telephone", label:"Téléphone"},
    {key:"contactMarketing", label:"Contact marketing"},
  ];
}

function updateFilterOptions(){
  const sel = $("#filterSelect");
  const sel2 = $("#filterSelect2");
  const sel3 = $("#filterSelect3");
  const previousVal = sel.value;
  const previousVal2 = sel2.value;
  const previousVal3 = sel3.value;

  sel.innerHTML = "";
  const optAll = document.createElement("option");
  optAll.value = "";
  optAll.textContent = currentTab === "groupe" ? "Toutes les villes" : (currentTab === "fournisseurs" ? "Tous les domaines" : "Toutes les villes");
  sel.appendChild(optAll);
  let list;
  if(currentTab === "groupe") list = VILLES;
  else if(currentTab === "fournisseurs") list = DOMAINES_FOURN;
  else list = Array.from(new Set(dataStore.concessions.map(c=>c.ville).filter(Boolean))).sort((a,b)=>a.localeCompare(b,"fr"));
  list.forEach(v=>{ const o=document.createElement("option"); o.value=v; o.textContent=v; sel.appendChild(o); });
  if(list.includes(previousVal)) sel.value = previousVal;

  if(currentTab === "groupe" || currentTab === "concessions"){
    sel2.style.display = "";
    sel2.innerHTML = "";
    const optAll2 = document.createElement("option");
    optAll2.value=""; optAll2.textContent="Toutes les marques";
    sel2.appendChild(optAll2);
    MARQUES.forEach(m=>{ const o=document.createElement("option"); o.value=m; o.textContent=m; sel2.appendChild(o); });
    if(MARQUES.includes(previousVal2)) sel2.value = previousVal2;
  }else{
    sel2.style.display = "none";
    sel2.value = "";
  }

  if(currentTab === "concessions"){
    sel3.style.display = "";
    sel3.innerHTML = "";
    const optAll3 = document.createElement("option");
    optAll3.value=""; optAll3.textContent="Tous les départements";
    sel3.appendChild(optAll3);
    const depts = Array.from(new Set(dataStore.concessions.map(c=>c.departement).filter(Boolean))).sort((a,b)=>a.localeCompare(b,"fr"));
    depts.forEach(d=>{ const o=document.createElement("option"); o.value=d; o.textContent=d; sel3.appendChild(o); });
    if(depts.includes(previousVal3)) sel3.value = previousVal3;
  }else{
    sel3.style.display = "none";
    sel3.value = "";
  }
}

function haystackOf(item){
  return Object.values(item).map(v=> Array.isArray(v) ? v.join(" ") : (v||"")).join(" ").toLowerCase();
}

function render(){
  updateFilterOptions();
  $("#modeIndicator").textContent = isAdmin ? `Admin · ${currentAdminUser ? currentAdminUser.name : ""}` : "Consultation";
  $("#modeIndicator").classList.toggle("on", isAdmin);
  $("#toggleAdminBtn").textContent = isAdmin ? "Quitter le mode admin" : "Activer le mode admin";
  $("#historyBtn").style.display = isAdmin ? "inline-flex" : "none";
  $("#exportBtn").style.display = isAdmin ? "inline-flex" : "none";
  $("#addBtn").style.display = isAdmin ? "inline-flex" : "none";

  const query = $("#searchInput").value.trim().toLowerCase();
  const filterVal = $("#filterSelect").value;
  const filterVal2 = $("#filterSelect2").value;
  const filterVal3 = $("#filterSelect3").value;
  const list = dataStore[currentTab] || [];
  const isGroupe = currentTab === "groupe";
  const isConcessions = currentTab === "concessions";

  const filtered = list.filter(item=>{
    const matchesQuery = !query || haystackOf(item).includes(query);
    let matchesFilter = true;
    if(filterVal){
      if(isGroupe){
        matchesFilter = item.villePrincipale === filterVal || asArray(item.perimetre).includes(filterVal);
      }else if(isConcessions){
        matchesFilter = item.ville === filterVal;
      }else{
        matchesFilter = item.domaine === filterVal;
      }
    }
    let matchesFilter2 = true;
    if((isGroupe || isConcessions) && filterVal2){
      matchesFilter2 = asArray(item.marques).includes(filterVal2);
    }
    let matchesFilter3 = true;
    if(isConcessions && filterVal3){
      matchesFilter3 = item.departement === filterVal3;
    }
    return matchesQuery && matchesFilter && matchesFilter2 && matchesFilter3;
  }).sort((a,b)=>{
    const an = (isGroupe ? a.nom : (isConcessions ? a.societe : a.societe)) || "";
    const bn = (isGroupe ? b.nom : (isConcessions ? b.societe : b.societe)) || "";
    return an.localeCompare(bn, "fr");
  });

  $("#countBadge").textContent = `${filtered.length} fiche${filtered.length>1?"s":""}${(query||filterVal||filterVal2||filterVal3) ? " (filtrées / "+list.length+" au total)" : ""}`;

  renderThead();
  renderTbody(filtered);
}

function renderThead(){
  const cols = getColumns();
  const row = $("#theadRow");
  row.innerHTML = cols.map(c=>`<th>${escapeHtml(c.label)}</th>`).join("") + (isAdmin ? `<th style="text-align:right;">Actions</th>` : "");
}

function renderTbody(filtered){
  const tbody = $("#tbody");
  const isGroupe = currentTab === "groupe";
  const cols = getColumns();

  if(filtered.length === 0){
    tbody.innerHTML = `<tr class="empty-row"><td colspan="${cols.length + (isAdmin?1:0)}">
      ${isAdmin ? "Aucune fiche. Clique sur \"Ajouter une fiche\" pour commencer." : "Aucune fiche pour le moment."}
    </td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(item=>{
    const cells = cols.map(c=>renderCell(item, c.key, isGroupe)).join("");
    const actions = isAdmin ? `<td class="actions-cell">
      <button class="btn btn-outline btn-sm" data-action="edit" data-id="${item.id}">Modifier</button>
      <button class="btn btn-danger btn-sm" data-action="delete" data-id="${item.id}">Supprimer</button>
    </td>` : "";
    return `<tr data-row-id="${item.id}">${cells}${actions}</tr>`;
  }).join("");

  if(isAdmin){
    tbody.querySelectorAll('[data-action="edit"]').forEach(btn=>{
      btn.onclick = ()=>openModal(btn.dataset.id);
    });
    tbody.querySelectorAll('[data-action="delete"]').forEach(btn=>{
      btn.onclick = ()=>deleteEntry(btn.dataset.id);
    });
  }
}

function gmailLink(email){
  return `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(email)}`;
}

function renderCell(item, key, isGroupe){
  if(key === "nom"){
    return `<td class="name-cell">${escapeHtml(item.nom||"—")}</td>`;
  }
  if(key === "email"){
    if(!item.email) return `<td>—</td>`;
    return `<td><a class="mail-link" href="${gmailLink(item.email)}" target="_blank" rel="noopener">✉️ ${escapeHtml(item.email)}</a></td>`;
  }
  if(key === "perimetre" || key === "marques"){
    const arr = asArray(item[key]);
    if(arr.length === 0) return `<td>—</td>`;
    const cls = key === "marques" ? "chip brand" : "chip";
    return `<td><div class="chip-cell">${arr.map(v=>`<span class="${cls}">${escapeHtml(v)}</span>`).join("")}</div></td>`;
  }
  if(key === "contratGroupe"){
    const isYes = item.contratGroupe === "O";
    return `<td><span class="chip ${isYes?"contract-yes":""}">${isYes?"Oui":"Non"}</span></td>`;
  }
  if(key === "interlocuteur"){
    const label = `${item.prenomInterlocuteur||""} ${(item.nomInterlocuteur||"").toUpperCase()}`.trim();
    return `<td>${escapeHtml(label || "—")}</td>`;
  }
  if(key === "societe"){
    return `<td class="name-cell">${escapeHtml(item.societe||"—")}</td>`;
  }
  const val = item[key];
  return `<td>${escapeHtml(val || "—")}</td>`;
}

// ---- Modal fiche (ajout/édition) ----
function openModal(id){
  editingId = id;
  const isGroupe = currentTab === "groupe";
  const isConcessions = currentTab === "concessions";
  const item = id ? dataStore[currentTab].find(x=>x.id===id) : {};
  $("#modalTitle").textContent = id ? "Modifier la fiche" : "Nouvelle fiche";

  let fieldsHtml = "";
  if(isGroupe){
    fieldsHtml = `
      ${field("nom","Nom", item.nom, "text", true)}
      ${field("prenom","Prénom", item.prenom)}
      ${field("fonction","Fonction", item.fonction)}
      ${selectField("villePrincipale","Ville principale", item.villePrincipale, VILLES)}
      ${checkboxGroup("perimetre","Périmètre (autres villes suivies)", asArray(item.perimetre), VILLES)}
      ${checkboxGroup("marques","Marques", asArray(item.marques), MARQUES)}
      ${field("telephone","Téléphone", item.telephone)}
      ${field("email","Email", item.email, "email")}
    `;
  }else if(isConcessions){
    fieldsHtml = `
      ${field("societe","Société (raison sociale)", item.societe, "text", true)}
      ${checkboxGroup("marques","Marques", asArray(item.marques), MARQUES)}
      ${field("ville","Ville", item.ville, "text", true)}
      ${field("departement","Département", item.departement, "text")}
      ${field("adresse","Adresse", item.adresse)}
      ${field("cp","Code postal", item.cp)}
      ${field("siret","SIRET", item.siret)}
      ${field("siren","SIREN", item.siren)}
      ${field("naf","Code NAF", item.naf)}
      ${field("telephone","Téléphone", item.telephone)}
      ${field("fax","Fax", item.fax)}
      ${field("tva","TVA intracommunautaire", item.tva)}
      ${field("contactMarketing","Contact marketing", item.contactMarketing)}
      ${field("commentaire","Commentaire", item.commentaire)}
    `;
  }else{
    fieldsHtml = `
      ${field("societe","Nom de la société", item.societe, "text", true)}
      ${selectField("domaine","Domaine d'intervention", item.domaine, DOMAINES_FOURN)}
      ${field("departements","Départements d'intervention", item.departements, "text")}
      ${selectField("contratGroupe","Contrat groupe", item.contratGroupe, [{value:"O",label:"Oui"},{value:"N",label:"Non"}])}
      ${field("nomInterlocuteur","Nom interlocuteur", item.nomInterlocuteur)}
      ${field("prenomInterlocuteur","Prénom interlocuteur", item.prenomInterlocuteur)}
      ${field("telephone","Téléphone", item.telephone)}
      ${field("email","Email", item.email, "email")}
    `;
  }
  $("#modalBody").innerHTML = fieldsHtml;
  $("#overlay").classList.add("show");
}

function field(key,label,val,type="text",required=false){
  return `<div class="field"><label>${label}${required?" *":""}</label><input type="${type}" id="f_${key}" value="${escapeAttr(val||"")}"></div>`;
}
function selectField(key,label,val,options){
  const normalized = options.map(o => typeof o === "string" ? {value:o,label:o} : o);
  return `<div class="field"><label>${label}</label><select id="f_${key}">
    <option value="">—</option>
    ${normalized.map(o=>`<option value="${escapeAttr(o.value)}" ${o.value===val?"selected":""}>${escapeHtml(o.label)}</option>`).join("")}
  </select></div>`;
}
function checkboxGroup(key,label,selectedArray,options){
  return `<div class="field"><label>${label}</label><div class="checkbox-group" id="grp_${key}">
    ${options.map(o=>`<label><input type="checkbox" value="${escapeAttr(o)}" ${selectedArray.includes(o)?"checked":""}> ${escapeHtml(o)}</label>`).join("")}
  </div></div>`;
}
function getCheckedValues(key){
  return Array.from(document.querySelectorAll(`#grp_${key} input:checked`)).map(i=>i.value);
}

async function handleSave(){
  const isGroupe = currentTab === "groupe";
  const isConcessions = currentTab === "concessions";
  const simpleKeys = isGroupe
    ? ["nom","prenom","fonction","villePrincipale","telephone","email"]
    : isConcessions
    ? ["societe","ville","departement","adresse","cp","siret","siren","naf","telephone","fax","tva","contactMarketing","commentaire"]
    : ["societe","domaine","departements","contratGroupe","nomInterlocuteur","prenomInterlocuteur","telephone","email"];

  const values = {};
  simpleKeys.forEach(k=>{ const el = document.getElementById("f_"+k); values[k] = el ? el.value.trim() : ""; });

  if(isGroupe || isConcessions){
    values.marques = getCheckedValues("marques");
  }
  if(isGroupe){
    values.perimetre = getCheckedValues("perimetre");
  }

  const requiredKey = isGroupe ? "nom" : "societe";
  if(!values[requiredKey]){
    showToast(isGroupe ? "Le nom est obligatoire." : "Le nom de la société est obligatoire.");
    return;
  }

  const label = isGroupe ? `${values.prenom} ${values.nom}`.trim() : values.societe;
  const wasEditing = !!editingId;

  if(editingId){
    const idx = dataStore[currentTab].findIndex(x=>x.id===editingId);
    if(idx>-1) dataStore[currentTab][idx] = {...dataStore[currentTab][idx], ...values};
  }else{
    values.id = "id_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
    dataStore[currentTab].push(values);
  }
  $("#saveBtn").disabled = true;
  $("#saveBtn").textContent = "Enregistrement…";
  await saveList(currentTab);
  logAction(wasEditing ? "modification" : "creation", label); // en arrière-plan, pas bloquant
  $("#saveBtn").disabled = false;
  $("#saveBtn").textContent = "Enregistrer";
  closeModal();
  render();
  showToast("Fiche enregistrée.");
}

async function deleteEntry(id){
  const item = dataStore[currentTab].find(x=>x.id===id);
  const label = item ? (currentTab==="groupe" ? `${item.prenom||""} ${item.nom||""}`.trim() : item.societe) : "Fiche";
  if(!confirm("Supprimer définitivement cette fiche ?")) return;
  dataStore[currentTab] = dataStore[currentTab].filter(x=>x.id!==id);
  showToast("Suppression en cours…");
  await saveList(currentTab);
  logAction("suppression", label); // en arrière-plan, pas bloquant
  render();
  showToast("Fiche supprimée.");
}

function closeModal(){
  $("#overlay").classList.remove("show");
  editingId = null;
}

// ---- Historique ----
$("#historyBtn").onclick = ()=>{ renderHistory(); $("#historyOverlay").classList.add("show"); };
$("#exportBtn").onclick = exportToExcel;
$("#closeHistoryBtn").onclick = ()=> $("#historyOverlay").classList.remove("show");
$("#historyOverlay").addEventListener("click", e=>{ if(e.target.id==="historyOverlay") $("#historyOverlay").classList.remove("show"); });

// ---- Mode admin (code d'accès) ----
async function openSigninModal(){
  $("#signinMsg").className = "signin-msg";
  $("#signinMsg").textContent = "";
  $("#adminCodeInput").value = "";
  try{
    const saved = await storageGet("annuaire:dernier_nom_admin", false);
    if(saved) $("#adminNameInput").value = saved.value;
  }catch(e){}
  $("#signinOverlay").classList.add("show");
  $("#adminNameInput").focus();
}
function closeSigninModal(){ $("#signinOverlay").classList.remove("show"); }

async function handleAdminLogin(){
  const name = $("#adminNameInput").value.trim();
  const code = $("#adminCodeInput").value;

  if(!name){
    $("#signinMsg").className = "signin-msg error";
    $("#signinMsg").textContent = "Merci d'indiquer ton nom.";
    return;
  }
  if(code !== ADMIN_CODE){
    $("#signinMsg").className = "signin-msg error";
    $("#signinMsg").textContent = "Code incorrect.";
    return;
  }

  isAdmin = true;
  currentAdminUser = { name };
  try{ await storageSet("annuaire:dernier_nom_admin", name, false); }catch(e){}
  closeSigninModal();
  render();
  showToast(`Mode admin activé pour ${name}.`);
}

$("#toggleAdminBtn").onclick = ()=>{
  if(isAdmin){
    isAdmin = false;
    currentAdminUser = null;
    render();
    showToast("Mode consultation activé.");
  }else{
    openSigninModal();
  }
};
$("#closeSigninBtn").onclick = closeSigninModal;
$("#signinCancelBtn").onclick = closeSigninModal;
$("#signinConfirmBtn").onclick = handleAdminLogin;
$("#adminCodeInput").addEventListener("keydown", e=>{ if(e.key==="Enter") handleAdminLogin(); });
$("#signinOverlay").addEventListener("click", e=>{ if(e.target.id==="signinOverlay") closeSigninModal(); });

// ---- Tabs / recherche / filtres ----
document.querySelectorAll(".tab").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentTab = btn.dataset.tab;
    $("#searchInput").value = "";
    render();
  };
});
$("#searchInput").addEventListener("input", render);
$("#filterSelect").addEventListener("change", render);
$("#filterSelect3").addEventListener("change", render);
$("#filterSelect2").addEventListener("change", render);
$("#addBtn").onclick = ()=> openModal(null);

// ---- Modal fiche wiring ----
$("#closeModalBtn").onclick = closeModal;
$("#cancelBtn").onclick = closeModal;
$("#saveBtn").onclick = handleSave;
$("#overlay").addEventListener("click", (e)=>{ if(e.target.id==="overlay") closeModal(); });

loadData();
</script>
